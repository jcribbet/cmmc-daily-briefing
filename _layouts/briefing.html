<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2129;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f3a5f;
      --green: #3fb950;
      --orange: #d29922;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
    }
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .header a:hover { text-decoration: underline; }
    .header .site-title {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.925rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    .briefing-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .briefing-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .meta {
      color: var(--text-secondary);
      font-size: 0.825rem;
    }
    .meta .count {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 0.1rem 0.45rem;
      border-radius: 8px;
      font-size: 0.725rem;
      font-weight: 600;
      margin-left: 0.25rem;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--orange);
      margin: 2.5rem 0 1.25rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 1.5rem 0 0.4rem;
    }
    p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    strong { color: var(--text-primary); font-weight: 600; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    em { color: var(--text-secondary); font-style: italic; font-size: 0.85rem; }
    .footer {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.775rem;
    }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .header { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <span class="site-title">CMMC Daily Briefing</span>
      <a href="{{ '/' | relative_url }}">&larr; All Briefings</a>
    </div>
  </div>
  <div class="container">
    <div class="briefing-header">
      <h1>{{ page.title }}</h1>
      <div class="meta">
        {{ page.date | date: "%A, %B %d, %Y" }}
        <span class="count">{{ page.items }} items</span>
      </div>
    </div>
    {{ content }}
  </div>
  <div class="footer">
    Generated by Perplexity Computer &middot; <a href="{{ '/' | relative_url }}">View all briefings</a>
  </div>
</body>
</html>
